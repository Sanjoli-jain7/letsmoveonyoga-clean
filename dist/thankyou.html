<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Let's MoveOn Yoga</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    body{
      margin:0;
      background:#F8F6F2;
    }

    .thankyou-section{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      background:
      radial-gradient(circle at top,#edf4ec 0%,#f8f6f2 60%);
    }

    .thankyou-card{
      max-width:700px;
      width:100%;
      background:#fff;
      border-radius:28px;
      padding:60px 50px;
      text-align:center;
      box-shadow:0 18px 45px rgba(0,0,0,.08);
      animation:fadeUp .8s ease;
    }

    .check{
      width:95px;
      height:95px;
      margin:auto;
      border-radius:50%;
      background:#8B9A86;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:48px;
      box-shadow:0 12px 30px rgba(139,154,134,.35);
    }

    .thankyou-card h1{
      margin-top:28px;
      margin-bottom:18px;
      font-size:52px;
      color:#2E3D37;
    }

    .thankyou-card h3{
      color:#8B9A86;
      margin-bottom:22px;
      font-weight:500;
    }

    .thankyou-card p{
      font-size:19px;
      line-height:1.8;
      color:#5d6763;
      margin-bottom:40px;
    }

    .button-group{
      display:flex;
      gap:18px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn-home{
      background:#8B9A86;
      color:white;
      padding:15px 36px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:.3s;
    }

    .btn-home:hover{
      background:#788671;
      transform:translateY(-3px);
    }

    .btn-class{
      border:2px solid #8B9A86;
      color:#8B9A86;
      padding:15px 36px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:.3s;
    }

    .btn-class:hover{
      background:#8B9A86;
      color:white;
      transform:translateY(-3px);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      .thankyou-card{
        padding:40px 25px;
      }

      .thankyou-card h1{
        font-size:38px;
      }

      .thankyou-card p{
        font-size:17px;
      }

    }

  </style>

  <link rel="stylesheet" crossorigin href="/assets/style-Bjvce3GI.css">
</head>

<body>

<section class="thankyou-section">

<div class="thankyou-card">

<div class="check">
✓
</div>

<h1>Thank You!</h1>

<h3>🙏 Namaste</h3>

<p>
Your message has been received successfully.
<br><br>
Thank you for reaching out to <strong>Let's MoveOn Yoga</strong>.
We'll contact you shortly to assist you with your yoga journey.
</p>

<div class="button-group">

<a href="index.html" class="btn-home">
🏠 Back to Home
</a>

<a href="classes.html" class="btn-class">
🧘 Explore Classes
</a>

</div>

</div>

</section>

</body>
</html>
